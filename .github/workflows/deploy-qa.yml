name: Deploy to QA

on:
  push:
    branches: [dev]

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: Preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to QA
        run: |
          supabase db push --db-url "postgresql://postgres:${{ secrets.QA_DB_PASSWORD }}@${{ vars.QA_DB_HOST }}:5432/postgres?sslmode=require" --yes
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.QA_SUPABASE_SERVICE_ROLE_KEY }}
        if: vars.QA_DB_HOST != ''

      - name: Seed QA data
        run: |
          PGPASSWORD=${{ secrets.QA_DB_PASSWORD }} psql -h ${{ vars.QA_DB_HOST }} -U postgres -d postgres -f supabase/seed.sql
        if: vars.QA_DB_HOST != ''
