name: Deploy to QA

on:
  push:
    branches: [dev]

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: Preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to QA
        run: |
          supabase db push --db-url "postgresql://${QA_DB_USER}:${QA_DB_PASSWORD}@${QA_DB_HOST}:${QA_DB_PORT}/postgres?sslmode=require" --yes
        env:
          QA_DB_HOST: ${{ vars.QA_DB_HOST }}
          QA_DB_PORT: ${{ vars.QA_DB_PORT }}
          QA_DB_USER: ${{ vars.QA_DB_USER }}
          QA_DB_PASSWORD: ${{ secrets.QA_DB_PASSWORD }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.QA_SUPABASE_SERVICE_ROLE_KEY }}
        if: vars.QA_DB_HOST != ''

      - name: Seed QA data
        run: |
          PGPASSWORD="${QA_DB_PASSWORD}" psql -h "${QA_DB_HOST}" -p "${QA_DB_PORT}" -U "${QA_DB_USER}" -d postgres -f supabase/qa.seed.sql
        env:
          QA_DB_HOST: ${{ vars.QA_DB_HOST }}
          QA_DB_PORT: ${{ vars.QA_DB_PORT }}
          QA_DB_USER: ${{ vars.QA_DB_USER }}
          QA_DB_PASSWORD: ${{ secrets.QA_DB_PASSWORD }}
        if: vars.QA_DB_HOST != ''
